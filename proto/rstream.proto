syntax = "proto3";

option go_package = "./pb";

import "google/protobuf/descriptor.proto";

extend google.protobuf.FileOptions {
  string protocol_version = 51000;
}

extend google.protobuf.FieldOptions {
  string access = 51234;
}

option (protocol_version) = "1.4.1";

package rstream.io_rstrm.protobuf;

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

// Address structure used for representing IP addresses

message IpAddress {
  oneof addr {
    fixed32 v4 = 1;
    bytes v6 = 2;
  }
}

// Error codes grouped by class
//   1000-1999: Authentication / authorization
//   2000-2999: Request validation / protocol
//   3000-3999: Not found
//   4000-4999: Invalid state / stream
//   5000-5999: Feature / plan / config not available
//   6000-6999: Service dependency unavailable
//   9000-9999: Internal errors
enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;

  // 1000-1999: Authentication / authorization
  ERROR_CODE_UNAUTHORIZED = 1000;

  // 2000-2999: Request validation / protocol
  ERROR_CODE_INVALID_REQUEST = 2000;
  ERROR_CODE_PROTOCOL_VERSION_MISSING = 2010;
  ERROR_CODE_PROTOCOL_VERSION_INVALID = 2020;
  ERROR_CODE_PROTOCOL_VERSION_INCOMPATIBLE = 2030;

  // 3000-3999: Not found
  ERROR_CODE_TUNNEL_NOT_FOUND = 3000;

  // 4000-4999: Invalid state / stream
  ERROR_CODE_INVALID_STREAM = 4000;

  // 5000-5999: Feature / plan / config not available
  ERROR_CODE_FEATURE_NOT_AVAILABLE = 5000;

  // 6000-6999: Service dependency unavailable
  ERROR_CODE_SERVICE_UNAVAILABLE = 6000;

  // 9000-9999: Internal errors
  ERROR_CODE_INTERNAL = 9000;
}

// Error message structure used for reporting issues.

message Error {
  ErrorCode code = 1;
  google.protobuf.StringValue message = 2;
}

// Client information including details like agent, operating system, authentication token, etc.

message ClientDetails {
  google.protobuf.StringValue agent = 1;
  google.protobuf.StringValue channel = 2;
  google.protobuf.StringValue version = 3;
  google.protobuf.StringValue os = 4;
  google.protobuf.StringValue arch = 5;
  google.protobuf.StringValue token = 6;
  google.protobuf.StringValue protocol_version = 7;
}

// Informations returned by server

message ServerDetails {
  google.protobuf.StringValue agent = 1;
  google.protobuf.StringValue channel = 2;
  google.protobuf.StringValue version = 3;
  google.protobuf.StringValue plan = 4;
  google.protobuf.StringValue provider = 5;
  google.protobuf.StringValue region = 6;
  google.protobuf.StringValue update = 7;
}

// Tunnel message structure used for creating and managing tunnels

message TunnelProperties {
  google.protobuf.StringValue id = 1 [(access) = "read-only"];
  google.protobuf.Timestamp creation_date = 2 [(access) = "read-only"];
  google.protobuf.StringValue name = 3 [(access) = "read-write"];
  google.protobuf.StringValue type = 4 [(access) = "read-write"];
  google.protobuf.BoolValue publish = 5 [(access) = "read-write"];
  google.protobuf.StringValue protocol = 6 [(access) = "read-write"];
  map<string, string> labels = 7 [(access) = "read-write"];
  repeated string geoip = 8 [(access) = "read-write"];
  repeated string trusted_ips = 9 [(access) = "read-write"];
  google.protobuf.StringValue host = 10 [(access) = "read-only", deprecated = true];
  google.protobuf.StringValue tls_mode = 11 [(access) = "read-write"];
  repeated string tls_alpns = 12 [(access) = "read-write"];
  google.protobuf.StringValue tls_min_version = 13 [(access) = "read-write"];
  repeated string tls_ciphers = 14 [(access) = "read-write"];
  google.protobuf.BoolValue mtls_auth = 15 [(access) = "read-write"];
  google.protobuf.StringValue mtls_cacert_pem = 16 [(access) = "read-write", deprecated = true];
  google.protobuf.StringValue http_version = 17 [(access) = "read-write"];
  google.protobuf.BoolValue http_use_tls = 18 [(access) = "read-write", deprecated = true];
  google.protobuf.BoolValue token_auth = 19 [(access) = "read-write"];
  google.protobuf.BoolValue rstream_auth = 20 [(access) = "read-write"];
  google.protobuf.BoolValue challenge_mode = 21 [(access) = "read-write"];
  google.protobuf.StringValue hostname = 22 [(access) = "read-write"];
  google.protobuf.UInt32Value port = 23 [(access) = "read-only"];
  google.protobuf.BoolValue upstream_tls = 24 [(access) = "read-write"];
}

// When a client opens a new control channel to the server
// it must start by sending an 'OpenControlChannelReq' message

message OpenControlChannelReq {
  ClientDetails client_details = 1;
}

// The server responds to an 'OpenControlChannelReq' message with an
// 'OpenControlChannelRsp' message over the control channel
// The server response includes a unique client ID
// that is used to associate and authenticate future
// stream connections

message OpenControlChannelRsp {
  message Ok {
    string client_id = 1;
    ServerDetails server_details = 2;
  }
  oneof payload {
    Ok ok = 1;
    Error error = 2;
  }
}

// When a client wants to close the control channel, it sends
// a 'CloseControlChannelReq' message to the server

message CloseControlChannelReq {
  
}

// The server responds to a 'CloseControlChannelReq' message with a
// 'CloseControlChannelRsp' message over the control channel

message CloseControlChannelRsp {
  
}

// Clients send this message to the server over the control channel
// to request a new tunnel be opened on the client's behalf
// Tunnel name is optional and can be provided by the user to identify the tunnel

message OpenTunnelReq {
  string request_id = 1;
  TunnelProperties tunnel_properties = 2;
}

// When the server opens a new tunnel on behalf of
// a client, it sends a 'OpenTunnelRsp' message to notify the client

message OpenTunnelRsp {
  string request_id = 1;
  oneof payload {
    TunnelProperties tunnel_properties = 2;
    Error error = 3;
  }
}

// Message sent by a client to close a previously opened tunnel

message CloseTunnelReq {
  string tunnel_id = 1;
}

// Message sent by the server to inform a client that a tunnel has been closed

message CloseTunnelRsp {
  string tunnel_id = 1;
}

// When the server wants to initiate a new tunneled connection, it sends
// this message over the control channel to the client
// When a client receives this message, it must initiate a
// new proxy connection to the server

message ProxyConnReq {
  string tunnel_id = 1;
  string stream_id = 2;
  google.protobuf.StringValue secret = 3;
  IpAddress source_ip = 4;
}

// Client's response to a 'ConnectionInitReq'. The client can refuse the connection by providing an error.

message ProxyConnRsp {
  string stream_id = 1;
  Error error = 2;
}

// After a client receives a 'ProxyConnReq' message, it opens a new
// connection to the server and sends a 'ProxyReq' message

message ProxyReq {
  ClientDetails client_details = 1;
  string stream_id = 2;
  google.protobuf.BoolValue zero_rtt = 3;
}

// Server's response to a 'ProxyReq'. Skipped if zero_rtt option is enabled.

message ProxyRsp {
  Error error = 1;
}

// When a client wants to open a new stream, it opens a new
// connection to the server and sends a 'StreamReq' message
// providing either the tunnel ID or the tunnel name

message StreamReq {
  ClientDetails client_details = 1;
  string tunnel_id_name = 2;
  google.protobuf.BoolValue zero_rtt = 3;
}

// Server's response to a 'StreamReq'. Skipped if zero_rtt option is enabled.

message StreamRsp {
  oneof payload {
    string stream_id = 1;
    Error error = 2;
  }
}

// Sent by client and/or server to maintain the control channel active

message Heartbeat { }

// Allows the server to send unsolicited messages to the client
message ServerMessage {
  string message = 1;
}

message Message {
  oneof payload {
    OpenControlChannelReq open_control_channel_req = 1;
    OpenControlChannelRsp open_control_channel_rsp = 2;
    CloseControlChannelReq close_control_channel_req = 3;
    CloseControlChannelRsp close_control_channel_rsp = 4;
    OpenTunnelReq open_tunnel_req = 5;
    OpenTunnelRsp open_tunnel_rsp = 6;
    CloseTunnelReq close_tunnel_req = 7;
    CloseTunnelRsp close_tunnel_rsp = 8;
    ProxyConnReq proxy_conn_req = 9;
    ProxyConnRsp proxy_conn_rsp = 10;
    ProxyReq proxy_req = 11;
    ProxyRsp proxy_rsp = 12;
    StreamReq stream_req = 13;
    StreamRsp stream_rsp = 14;
    Heartbeat heartbeat = 15;
    ServerMessage server_message = 16;
  }
}
